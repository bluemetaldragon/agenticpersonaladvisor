name: ci
on: [push, pull_request]
jobs:
  gating:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Gating tests (must pass to merge)
        run: |
          cd backend
          pytest -q
